<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Original global sustainability visualization</title>
  <desc id="desc">Abstract globe, leaf, and logistics arcs representing responsible chemical sourcing.</desc>
