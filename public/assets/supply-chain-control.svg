<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" role="img" aria-labelledby="title desc">
  <title id="title">Original supply chain control visualization</title>
  <desc id="desc">Abstract control room interface for chemical sourcing, compliance, and logistics milestones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset=".5" stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="750" fill="url(#bg)"/>
  <g opacity=".18" stroke="#67e8f9">
    <path d="M0 90h1000M0 180h1000M0 270h1000M0 360h1000M0 450h1000M0 540h1000M0 630h1000"/>
    <path d="M100 0v750M200 0v750M300 0v750M400 0v750M500 0v750M600 0v750M700 0v750M800 0v750M900 0v750"/>
  </g>
