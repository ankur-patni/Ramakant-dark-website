    <rect x="38" y="44" width="270" height="182" rx="18" fill="#111827" stroke="#67e8f9" stroke-opacity=".18"/>
    <rect x="336" y="44" width="466" height="182" rx="18" fill="#111827" stroke="#67e8f9" stroke-opacity=".18"/>
    <rect x="38" y="258" width="764" height="254" rx="18" fill="#111827" stroke="#67e8f9" stroke-opacity=".18"/>
    <g stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#soft)">
      <path d="M80 178c48-80 102-82 156-20"/>
      <path d="M383 170h360"/>
      <path d="M383 108h230"/>
      <path d="M88 392h168l96-72 128 92 114-116 166 74"/>
    </g>
    <g fill="#67e8f9">
      <circle cx="88" cy="392" r="9"/><circle cx="256" cy="392" r="9"/><circle cx="352" cy="320" r="9"/>
      <circle cx="480" cy="412" r="9"/><circle cx="594" cy="296" r="9"/><circle cx="760" cy="370" r="9"/>
    </g>
    <g fill="#22c55e">
      <rect x="383" y="135" width="72" height="14" rx="7"/>
      <rect x="478" y="135" width="110" height="14" rx="7"/>
    </g>
    <g fill="#f59e0b">
