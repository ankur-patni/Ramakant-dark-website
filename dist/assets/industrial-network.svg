    <path d="M112 300V162l70 46 70-70v162zm180 0V118l82 54 78-92v220z" fill="#111827" stroke="#67e8f9" stroke-opacity=".25"/>
    <path d="M112 250h38m38 0h38m88-22h40m54 0h40M112 338h348" stroke="#67e8f9" stroke-opacity=".65" stroke-width="6" stroke-linecap="round"/>
    <path d="M504 300h54v82h-54z" fill="#020617" stroke="#67e8f9" stroke-opacity=".35"/>
    <path d="M94 382h484" stroke="#67e8f9" stroke-opacity=".32" stroke-width="8"/>
  </g>
  <g fill="#67e8f9" opacity=".9">
    <circle cx="838" cy="180" r="5"/>
