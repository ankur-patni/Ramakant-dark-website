<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" role="img" aria-labelledby="title desc">
  <title id="title">Original industrial trade network visualization</title>
  <desc id="desc">Abstract chemical export platform with factory geometry, molecular links, and global trade routes.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.58" stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="35%" r="58%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity=".35"/>
      <stop offset=".42" stop-color="#67e8f9" stop-opacity=".11"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1100" height="820" fill="url(#panel)"/>
  <rect width="1100" height="820" fill="url(#pulse)"/>
  <g opacity=".24" stroke="#67e8f9" stroke-width="1">
    <path d="M0 120h1100M0 240h1100M0 360h1100M0 480h1100M0 600h1100M0 720h1100"/>
    <path d="M110 0v820M220 0v820M330 0v820M440 0v820M550 0v820M660 0v820M770 0v820M880 0v820M990 0v820"/>
  </g>
  <g fill="none" stroke="#67e8f9" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M145 556C260 426 352 423 472 508S704 645 928 402" opacity=".75"/>
    <path d="M176 300c166 132 269 54 405 10s229-66 368 63" opacity=".55"/>
    <path d="M232 646c126-126 270-178 449-154 92 12 170-13 239-76" opacity=".45"/>
  </g>
  <g stroke="#67e8f9" stroke-width="4" fill="#020617" filter="url(#glow)">
    <circle cx="145" cy="556" r="16"/>
    <circle cx="472" cy="508" r="18"/>
    <circle cx="928" cy="402" r="22"/>
    <circle cx="176" cy="300" r="15"/>
    <circle cx="581" cy="310" r="20"/>
    <circle cx="949" cy="373" r="14"/>
    <circle cx="232" cy="646" r="14"/>
    <circle cx="681" cy="492" r="18"/>
  </g>
  <g transform="translate(320 178)" opacity=".96">
